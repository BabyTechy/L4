<!DOCTYPE html>
<html>

<head>
    <title>Positioning </title>
    <style>
        div {
            right: 30px;
            border: 3px solid red;
        }

        div.absolute {
            position: absolute;
            left: 50px;
            border: 3px solid orange;

        }

        div.relative {
            position: relative;
            left: 100px;
            border: 3px solid rgb(15, 239, 15);
        }

        div.fixed {
            position: fixed;
            right: 20px;
            border: 3px solid blue;
            top: 0;
            width: 300px;
        }

        div.sticky {
            position: sticky;
            top: 1px;
            left: 20px;
            width: 100px;
            border: 3px solid rgb(239, 140, 156);
        }
    </style>
</head>

<body>
    <h2>POSITIONING</h2>
    <div>
        Div with no position property
    </div>
    <div class="sticky">
        Div with sticky position property
    </div>
    <div class="relative">
        This div element has position: relative;
        <div class="absolute">
            Absolute class DIV
        </div>
    </div>
    <div class="fixed">
        Div with fixed position property
    </div>
